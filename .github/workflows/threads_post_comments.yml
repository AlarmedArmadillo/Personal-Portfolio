name: Threads Post Comments (Manual)

on:
  workflow_dispatch:
    inputs:
      post_shortcode:
        description: 'Threads post shortcode (from the URL)'
        required: false
        default: 'DZN_FJXjkXQ'

jobs:
  fetch_comments:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Fetch post comments
        env:
          THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
          POST_SHORTCODE: ${{ github.event.inputs.post_shortcode }}
        run: python scripts/threads_post_comments.py
