name: Threads Daily Analysis

on:
  schedule:
    - cron: '0 7 * * *'  # 7am UTC daily — refresh last 14 days of post metrics
  workflow_dispatch:       # Manual trigger from GitHub Actions tab

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run 14-day metrics sync
        env:
          THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
        run: python scripts/threads_notion_sync.py analyze
